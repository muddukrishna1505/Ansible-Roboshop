- name: configure the catalogue server
  hosts: catalogue
  become: yes
  tasks:
  - name: enable nodejs 20
    command: dnf module enable nodejs:20 -y
  - name: install nodejs
    package: 
      name: nodejs 
      state: present
  - name: create a system user
    user: 
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"
  - name: remove app directory
    file:
      path: /app
      state: absent
  - name: delete catalogue.zip from tmp dir
    file:
      path: /tmp/catalogue.zip
      state: absent
  - name: create app directory
    file:
      path: /app
      state: directory
  - name: download a remote file
    get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip 
      dest: /tmp/catalogue.zip
  - name: unzip the catalogue file
    unarchive: 
      src: /tmp/catalogue.zip
      dest: /app
      remote_src: yes

  - name: download dependencies
    community.general.npm:
      path: /app
  - name: copy catalogue service         
    template:
      src: catalogue.service.j2
      dest: /etc/systemd/system/catalogue.service
  - name: copy mongo repo
    copy:
      src: mongo.repo
      dest: /etc/yum.repos.d/mongo.repo

  - name: install mongo client
    package: 
      name: mongodb-mongosh
      state: present
  - name: check catalogue schema exist ot not
    shell: mongosh --host "{{ MONGODB_HOST }}" --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
    register: catalogue_output
    tags:
    - mongodb
  - name: print catalogue_output
    debug: 
      msg: "{{ catalogue_output }}"
    tags:
    - mongodb
  - name: load products
    shell: mongosh --host "{{ MONGODB_HOST }}" </app/db/master-data.js
    when: catalogue_output.stdout | int < 0
    tags:
    - mongodb
  - name: deamon reload
    systemd_service:
      name: catalogue
      daemon_reload: true
  - name: enable and start catalogue
    service:
      name: catalogue
      state: restarted
      enabled: yes          