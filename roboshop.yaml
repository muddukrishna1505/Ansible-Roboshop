- name: Roboshop instances creation
  hosts: local
  connection: local
  vars:
    instances: [ "mongo", "redis" ]
    image_id: ami-0220d79f3f480ecf5
    domain_name: bmkrishtech.online
    action: create

  tasks:
  - name: Creating ec2 instance
    amazon.aws.ec2_instance:
      instance_type: t3.micro
      name: "roboshop-{{ item }}"
      image_id: "{{ image_id }}"
      security_groups: 
      - "roboshop-{{ item }}"
      - roboshop-common
    loop: "{{ instances }}"
    register: ec2_output
    when: action == "create"  
